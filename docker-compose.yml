services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: msme_frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      BACKEND_URL: http://msme_app
    networks:
      - msme_net

networks:
  msme_net:
    external: true
